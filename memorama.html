<a-entity id="flipAudio" sound="src:#flipSound"></a-entity>
<a-entity id="matchAudio" sound="src:#matchSound"></a-entity>
<a-entity id="winAudio" sound="src:#winSound"></a-entity>

<a-entity position="0 0 2">

<a-camera>

<a-cursor
id="fuse-cursor"
fuse="true"
fuse-timeout="800"
material="color:#bc93fd"
geometry="primitive:ring;radiusInner:0.02;radiusOuter:0.035"
position="0 0 -1">
</a-cursor>

</a-camera>

<a-entity laser-controls="hand:left" raycaster="objects:.clickable"></a-entity>
<a-entity laser-controls="hand:right" raycaster="objects:.clickable"></a-entity>

</a-entity>

<a-sky color="#0f0f1a"></a-sky>

<a-light type="ambient" intensity="0.7"></a-light>
<a-light type="point" intensity="1" position="2 4 4"></a-light>

<a-entity id="board" position="4 1.4 -3" rotation="-20 0 0"></a-entity>
<a-box
position="0 0.3 -2"
width="1.5"
height="0.4"
depth="0.2"
color="#bc93fd"
class="clickable"
onclick="location.reload()">

<a-text
value="REINICIAR"
align="center"
position="0 0 0.11"
color="white"
width="4">
</a-text>

</a-box>

<!-- VICTORIA VR -->

<a-entity id="victory-vr" position="0 1.8 -2.5" visible="false">

<a-text
value="¡MEMORIA DE ELEFANTE! 🐘"
align="center"
color="#bc93fd"
width="6">
</a-text>

<a-box
position="0 -0.6 0"
width="2"
height="0.6"
depth="0.2"
color="#bc93fd"
class="clickable"
onclick="location.reload()">

<a-text
value="REINTENTAR"
align="center"
position="0 0 0.11"
color="white"
width="4">
</a-text>

</a-box>

</a-entity>

</a-scene>

<script>

const board=document.getElementById("board");

const icons=[
"#img1","#img2","#img3","#img4",
"#img5","#img6","#img7","#img8"
];

let cards=[...icons,...icons];

let first=null;
let second=null;
let lock=false;
let pairsFound=0;
let moves=0;

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}

function createBoard(){

board.innerHTML="";

let shuffled=shuffle([...cards]);

shuffled.forEach((img,i)=>{

let x=(i%4)*1.4-2.1;
let y=Math.floor(i/4)*1.4-1;

let cardWrap=document.createElement("a-entity");

cardWrap.classList.add("clickable");
cardWrap.setAttribute("position",`${x} ${y} 0`);
cardWrap.dataset.icon=img;

let front=document.createElement("a-box");

front.setAttribute("scale","1.2 1.2 0.05");
front.setAttribute("color","#2c2c2c");

let back=document.createElement("a-plane");

back.setAttribute("width","1.2");
back.setAttribute("height","1.2");
back.setAttribute("position","0 0 -0.03");
back.setAttribute("rotation","0 180 0");
back.setAttribute("src",img);

cardWrap.appendChild(front);
cardWrap.appendChild(back);

cardWrap.addEventListener("click",()=>flip(cardWrap));

board.appendChild(cardWrap);

});

}

function flip(card){

if(lock||card.dataset.matched||card===first)return;

document.querySelector("#flipAudio").components.sound.playSound();

card.setAttribute("animation","property:rotation;to:0 180 0;dur:400");

if(!first){

first=card;
return;

}

second=card;

moves++;

document.getElementById("moves").innerText=moves;

checkMatch();

}

function checkMatch(){

lock=true;

const isMatch=first.dataset.icon===second.dataset.icon;

if(isMatch){

document.querySelector("#matchAudio").components.sound.playSound();

first.dataset.matched=true;
second.dataset.matched=true;

pairsFound++;

document.getElementById("pairs").innerText=pairsFound;

if(pairsFound===icons.length){

showVictory();

}

resetTurn();

}else{

setTimeout(()=>{

first.setAttribute("animation","property:rotation;to:0 0 0;dur:400");
second.setAttribute("animation","property:rotation;to:0 0 0;dur:400");

resetTurn();

},1000);

}

}

function resetTurn(){

first=null;
second=null;
lock=false;

}

function showVictory(){

document.querySelector("#winAudio").components.sound.playSound();

document.getElementById("victory-2d").style.display="flex";

document.getElementById("victory-vr").setAttribute("visible","true");

}

createBoard();

</script>
